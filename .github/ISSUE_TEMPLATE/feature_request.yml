name: Feature Request
description: Got an idea? We'd love to hear it.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got a feature idea? Describe it below. The more detail, the better.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What frustration or gap does this feature address?
      placeholder: "I keep having to switch between X and Y to do Z..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: How would this feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches that could work?

  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Chat
        - Image Generation
        - Video Generation
        - Model Management
        - UI/UX
        - Setup/Installation
        - New Feature
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use it regularly
        - Can't live without it
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        _Prefer chat? Join the Discord: https://locallyuncensored.com/discord_
